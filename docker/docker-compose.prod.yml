# Production Docker Compose for CMS.
#
# Usage (always run from the REPO ROOT so --env-file resolves correctly):
#
#   With bundled PostgreSQL:
#     docker compose -f docker/docker-compose.prod.yml --env-file .env --profile localdb up -d
#
#   With external PostgreSQL:
#     docker compose -f docker/docker-compose.prod.yml --env-file .env up -d
#
# NOTE: --env-file .env is required.
# Docker Compose only reads .env automatically when the file sits next to the
# compose file. Because this file lives in docker/ and .env is at the repo root,
# variable substitution (${CMS_CWS_HTTP_PORT}, etc.) silently falls back to the
# hardcoded defaults (8888/8889/8890) if --env-file is omitted, causing port
# conflicts if those defaults are already in use on the host.
#
# Requires a .env file at the repo root. Copy .env.example and fill in the values.

services:

  # ── PostgreSQL (optional — only active with --profile localdb) ────────────
  db:
    profiles: ["localdb"]
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - cms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Database initialization (run once, then exits) ────────────────────────
  # This service initializes the CMS database schema. It runs cmsSetupDB and
  # exits. The main cms service waits for this to complete before starting.
  # Re-running it on an existing database is safe (uses CREATE TABLE IF NOT EXISTS).
  db-init:
    build:
      context: ..
      args:
        CMS_LOADER_VERSION: ${CMS_LOADER_VERSION:-main}
        CMS_LOADER_BASE_PATH: ${CMS_LOADER_BASE_PATH:-/}
    env_file:
      - path: ../.env
        required: false
    depends_on:
      db:
        condition: service_healthy
        required: false
    command: ["cmsSetupDB"]
    restart: "no"

  # ── CMS (all services managed by supervisord) ─────────────────────────────
  cms:
    build:
      context: ..
      args:
        CMS_LOADER_VERSION: ${CMS_LOADER_VERSION:-main}
        CMS_LOADER_BASE_PATH: ${CMS_LOADER_BASE_PATH:-/}
    env_file:
      - path: ../.env
        required: false
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - cms-data:/home/cmsuser/cms/lib
      - cms-logs:/home/cmsuser/cms/log
      - cms-cache:/home/cmsuser/cms/cache
      - ../dumps:/home/cmsuser/cms/dumps
    tmpfs:
      - /home/cmsuser/cms/run
    privileged: true
    cgroup: host
    ports:
      - "${CMS_CWS_HTTP_PORT:-8888}:${CMS_CWS_HTTP_PORT:-8888}"
      - "${CMS_AWS_HTTP_PORT:-8889}:${CMS_AWS_HTTP_PORT:-8889}"
      - "${CMS_RWS_HTTP_PORT:-8890}:${CMS_RWS_HTTP_PORT:-8890}"
      - "${CMS_LOADER_PORT:-9995}:${CMS_LOADER_PORT:-9995}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sfL http://localhost:${CMS_AWS_HTTP_PORT:-8889}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "${CMS_LOG_MAX_SIZE:-500m}"
        max-file: "${CMS_LOG_MAX_FILES:-10}"

volumes:
  cms-pgdata:
  cms-data:
  cms-logs:
  cms-cache:
